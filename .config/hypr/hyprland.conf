monitor=,preferred,auto,1.25

exec = waybar.sh
exec = swaync.sh
exec = power_management.sh
exec-once = nightlight.sh --toggle
exec-once = wallpaper.sh --restore
exec-once = wl-paste --watch cliphist store
exec-once = policykit.sh
exec = mpd.sh

exec = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec = gsettings set org.gnome.desktop.interface gtk-theme 'adw-gtk3-dark'
exec = gsettings set org.gnome.desktop.interface cursor-theme 'Adwaita'
exec = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'
env = QT_QPA_PLATFORMTHEME,qt6ct

$terminal = foot
$menu = rofi -show drun
$policykit = lxqt-policykit-agent

layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace notifications

windowrule = border_size 0, match:workspace w[t1]s[false]
windowrule = border_size 0, rounding 8, match:float 1
windowrule = no_shadow on, rounding 0, match:float 0, match:workspace s[false]
workspace = special:special, gapsin:8, gapsout:16, bordersize:2, rounding:12

windowrule {
    name = float-file-picker
    match:class = xdg-desktop-portal-gtk
    float = on
}

windowrule = float on, rounding 8, border_size 1, match:class ($policykit)

input {
    kb_layout = us, ro
    kb_variant = ,std

    follow_mouse = 1
    repeat_rate = 40
    repeat_delay = 350 

    touchpad {
        natural_scroll = true
        drag_lock = 0
    }
}

general {
    gaps_in = 0
    gaps_out = 0
    border_size = 1
    col.active_border = rgba(A7C080ff)
    col.inactive_border = rgba(333C43ff)

    layout = dwindle
    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = false
}

cursor {
    hotspot_padding = 0
    zoom_factor = 1
    zoom_detached_camera = false
}

decoration {
    rounding = 12
    
    blur {
        enabled = true
        size = 8
        passes = 2
    }

    shadow {
        enabled = true
        range = 50
        color = 0x55000000
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 0, 1, default, popin 80%
    animation = windowsOut, 0, 1, default, popin 80%
    animation = border, 0, 1, default
    animation = borderangle, 0, 1, default
    animation = fade, 0, 1, default
    animation = workspaces, 0, 1, default
    animation = zoomFactor, 1, 0.01, default
}

dwindle {
    preserve_split = true 
    force_split = 2
}

misc {
    font_family = monospace
    background_color = 0x282828
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    animate_manual_resizes = true
    on_focus_under_fullscreen = 2
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    disable_xdg_env_checks = true
    enable_anr_dialog = false
}

xwayland {
    force_zero_scaling = true
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

$mainMod = SUPER

bind = $mainMod SHIFT, E, exit 
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod, Q, killactive 
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1
bind = $mainMod SHIFT, SPACE, togglefloating 
bind = $mainMod SHIFT, P, pin

binde = $mainMod, H, movefocus, l
binde = $mainMod, J, movefocus, d
binde = $mainMod, K, movefocus, u
binde = $mainMod, L, movefocus, r

# Move active tiled window
binde = $mainMod SHIFT, H, movewindow, l
binde = $mainMod SHIFT, J, movewindow, d
binde = $mainMod SHIFT, K, movewindow, u
binde = $mainMod SHIFT, L, movewindow, r

# Resize active window
binde = $mainMod CTRL, LEFT,  resizeactive, -20 0
binde = $mainMod CTRL, DOWN,  resizeactive, 0 20
binde = $mainMod CTRL, UP,    resizeactive, 0 -20
binde = $mainMod CTRL, RIGHT, resizeactive, 20 0

# Special workspace
bind = $mainMod,       GRAVE, togglespecialworkspace, special
bind = $mainMod SHIFT, GRAVE, movetoworkspacesilent,  special

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Cycle through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = $mainMod, TAB, workspace, e+1
bind = $mainMod SHIFT, TAB, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

source = ~/.config/hypr/hotkeys.conf
source = ~/.local/bin-extras/machine-specific-hotkeys.conf
